name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Data commits are built and deployed by update-batch.yml itself; this
    # workflow only handles code/content changes.
    paths-ignore:
      - 'public/data.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Shared with update-batch.yml so the two never deploy to the github-pages
# environment at the same time.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
