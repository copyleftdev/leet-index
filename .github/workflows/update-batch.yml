name: Update Leaderboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: leet-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # The LEET_GITHUB_TOKEN secret lives inside an environment of the same
    # name, so the job must opt into that environment to read it.
    environment: LEET_GITHUB_TOKEN
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Detect batch index
        id: batch
        run: |
          HOUR=$(date -u +%-H)
          INDEX=$((HOUR % 24))
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"
          echo "Batch index: $INDEX"

      - name: Verify token is present
        env:
          GITHUB_TOKEN: ${{ secrets.LEET_GITHUB_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::LEET_GITHUB_TOKEN is empty. Unauthenticated runs hit the 60/hr limit and stall. Set the secret and retry."
            exit 1
          fi
          echo "Token present (length ${#GITHUB_TOKEN})."

      - name: Run batch
        env:
          GITHUB_TOKEN: ${{ secrets.LEET_GITHUB_TOKEN }}
        run: node scripts/run-all.js ${{ steps.batch.outputs.index }}

      - name: Commit leaderboard update
        run: |
          git config user.name  "leetindex-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- public/data.json; then
            echo "No changes to commit."
            exit 0
          fi

          git add public/data.json
          git commit -m "chore: batch ${{ steps.batch.outputs.index }} update"

          if git push origin HEAD:main; then
            exit 0
          fi

          echo "Push conflict — rebasing onto latest main and retrying."
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
